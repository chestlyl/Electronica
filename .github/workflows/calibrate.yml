name: Calibration Workflow

on:
  workflow_dispatch:
    inputs:
      church_id:
        description: 'Church ID for calibration'
        required: true
        type: string

jobs:
  calibrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run calibration
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run cli -- calibrate-run --id ${{ inputs.church_id }}

      - name: Generate calibration report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run cli -- calibrate-report

      - name: Upload calibration artifacts
        uses: actions/upload-artifact@v4
        with:
          name: calibration-results
          path: |
            docs/CALIBRATION_REPORT.md
            data/output/calibration/**
          retention-days: 30
